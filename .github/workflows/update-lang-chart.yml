name: Update Language Chart

on:
  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC on the 1st of every month
  workflow_dispatch:       # manual trigger from the Actions tab
  push:
    paths:
      - 'generate_lang_chart.py'

permissions:
  contents: write

jobs:
  build-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests matplotlib numpy

      - name: Generate chart
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: Wolren
          # Comma-separated repo names or owner/repo to skip entirely
          EXCLUDE_REPOS: ${{ vars.EXCLUDE_REPOS }}
          # Comma-separated languages whose bytes should be ignored
          EXCLUDE_LANGS: ${{ vars.EXCLUDE_LANGS }}
          # Minimum % to get its own slice (rest -> Other)
          MIN_SLICE_PCT: '1.5'
        run: python generate_lang_chart.py

      - name: Commit updated chart
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/language-map-pie.png assets/language-map-pie.json
          git diff --cached --quiet || git commit -m "chore: update language contribution map [skip ci]"
          git push
